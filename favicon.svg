<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Decorative outer arc -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#ring1)" stroke-width="6" stroke-dasharray="380 1040" stroke-dashoffset="-100" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="url(#ring2)" stroke-width="2" opacity="0.4"/>

  <!-- Subtle grid lines -->
  <line x1="256" y1="60" x2="256" y2="452" stroke="#e94560" stroke-width="1" opacity="0.12"/>
  <line x1="60" y1="256" x2="452" y2="256" stroke="#e94560" stroke-width="1" opacity="0.12"/>

  <!-- Accent dot top-right -->
  <circle cx="370" cy="142" r="12" fill="#e94560" opacity="0.8"/>
  <circle cx="370" cy="142" r="6" fill="#f5a623"/>

  <!-- Main Р letter -->
  <text x="256" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        font-weight="700"
        text-anchor="middle"
        fill="white"
        opacity="0.95">Р</text>

  <!-- Thin underline accent -->
  <rect x="156" y="340" width="200" height="6" rx="3" fill="url(#ring1)" opacity="0.9"/>

  <!-- Small label -->
  <text x="256" y="400"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="32"
        font-weight="300"
        letter-spacing="8"
        text-anchor="middle"
        fill="white"
        opacity="0.5">RUSSE</text>
</svg>
